services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - api
      - qgis-server
    ports:
      - "${WEB_PORT:-80}:80"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      APP_ENV: production
      APP_BASE_URL: ${APP_BASE_URL}
      WEB_BASE_URL: ${WEB_BASE_URL}
      RUNTIME_ROOT: ./runtime
      SEED_LAYERS_DIR: ./infra/seeds/layers
      QGIS_SERVER_BASE_URL: ${QGIS_SERVER_BASE_URL}
      QGIS_SERVER_INTERNAL_BASE_URL: http://qgis-server
      QGIS_MODELS_DIR: ./qgis/models
      QGIS_PUBLISH_DIR: ./runtime/published
      QGIS_RUNTIME_BASE_URL: http://qgis-runtime:8090
      DATABASE_URL: postgresql://geo_agent:geo_agent@postgis:5432/geo_agent
    volumes:
      - ../../runtime:/app/runtime
      - ../../infra/seeds:/app/infra/seeds
      - ../../qgis:/app/qgis
    depends_on:
      - postgis
      - qgis-runtime
      - qgis-server

  qgis-runtime:
    build:
      context: ../..
      dockerfile: infra/docker/qgis-runtime/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      APP_ENV: production
      RUNTIME_ROOT: ./runtime
      QGIS_MODELS_DIR: ./qgis/models
      QGIS_PUBLISH_DIR: ./runtime/published
      QGIS_PROCESS_BIN: qgis_process
    volumes:
      - ../../runtime:/app/runtime
      - ../../qgis:/app/qgis

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      - api
    environment:
      APP_ENV: production
      RUNTIME_ROOT: ./runtime
      DATABASE_URL: postgresql://geo_agent:geo_agent@postgis:5432/geo_agent
    volumes:
      - ../../runtime:/app/runtime
      - ../../qgis:/app/qgis

  postgis:
    image: postgis/postgis:16-3.5
    restart: unless-stopped
    environment:
      POSTGRES_DB: geo_agent
      POSTGRES_USER: geo_agent
      POSTGRES_PASSWORD: geo_agent
    volumes:
      - ../../infra/migrations:/docker-entrypoint-initdb.d
      - postgis_data:/var/lib/postgresql/data

  qgis-server:
    image: qgis/qgis-server:latest
    restart: unless-stopped
    volumes:
      - ../../runtime:/io/data
      - ../docker/qgis-server/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgis_data:

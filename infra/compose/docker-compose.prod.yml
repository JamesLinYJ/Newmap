services:
  postgis:
    image: ${POSTGIS_IMAGE:-postgis/postgis:16-3.5}
    container_name: newmap-postgis-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geo_agent}
      POSTGRES_USER: ${POSTGRES_USER:-geo_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGIS_PORT:-5432}:5432"
    volumes:
      - newmap-postgis-prod:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geo_agent} -d ${POSTGRES_DB:-geo_agent}"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  newmap-postgis-prod:

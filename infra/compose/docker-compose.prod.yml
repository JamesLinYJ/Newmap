services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_UPSTREAM: http://api:${API_PORT:-8010}
    ports:
      - "${WEB_PORT:-80}:8080"
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      APP_ENV: production
      API_HOST: api
      API_PORT: ${API_PORT:-8010}
      APP_BASE_URL: ${APP_BASE_URL:-}
      WEB_BASE_URL: ${WEB_BASE_URL:-}
      RUNTIME_ROOT: ./runtime
      SEED_LAYERS_DIR: ./infra/seeds/layers
      DATABASE_URL: postgresql://geo_agent:${DB_PASSWORD:-geo_agent}@postgis:5432/geo_agent
      WEATHER_UPLOAD_MAX_BYTES: ${WEATHER_UPLOAD_MAX_BYTES:-524288000}
    volumes:
      - ../../runtime:/app/runtime
      - ../../infra/seeds:/app/infra/seeds
    networks:
      - frontend
      - backend
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      APP_ENV: production
      RUNTIME_ROOT: ./runtime
      DATABASE_URL: postgresql://geo_agent:${DB_PASSWORD:-geo_agent}@postgis:5432/geo_agent
    volumes:
      - ../../runtime:/app/runtime
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  postgis:
    image: postgis/postgis:16-3.5
    restart: unless-stopped
    environment:
      POSTGRES_DB: geo_agent
      POSTGRES_USER: geo_agent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geo_agent}
    volumes:
      - ../../infra/migrations:/docker-entrypoint-initdb.d
      - postgis_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo_agent -d geo_agent"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

networks:
  frontend:
  backend:

volumes:
  postgis_data:

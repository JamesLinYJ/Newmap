services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_UPSTREAM: http://api:${API_PORT:-8010}
    ports:
      - "${WEB_PORT:-80}:80"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8010}
      APP_BASE_URL: ${APP_BASE_URL:-}
      WEB_BASE_URL: ${WEB_BASE_URL:-}
      RUNTIME_ROOT: ./runtime
      SEED_LAYERS_DIR: ./infra/seeds/layers
      DATABASE_URL: postgresql://geo_agent:geo_agent@postgis:5432/geo_agent
      WEATHER_UPLOAD_MAX_BYTES: ${WEATHER_UPLOAD_MAX_BYTES:-524288000}
    volumes:
      - ../../runtime:/app/runtime
      - ../../infra/seeds:/app/infra/seeds
    depends_on:
      - postgis

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      APP_ENV: production
      RUNTIME_ROOT: ./runtime
      DATABASE_URL: postgresql://geo_agent:geo_agent@postgis:5432/geo_agent
    volumes:
      - ../../runtime:/app/runtime

  postgis:
    image: postgis/postgis:16-3.5
    restart: unless-stopped
    environment:
      POSTGRES_DB: geo_agent
      POSTGRES_USER: geo_agent
      POSTGRES_PASSWORD: geo_agent
    volumes:
      - ../../infra/migrations:/docker-entrypoint-initdb.d
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data:

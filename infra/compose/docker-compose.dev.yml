services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api/Dockerfile
    env_file:
      - ../../.env
    environment:
      APP_BASE_URL: http://localhost:8000
      WEB_BASE_URL: http://localhost:5173
      RUNTIME_ROOT: ./runtime
      SEED_LAYERS_DIR: ./infra/seeds/layers
      QGIS_SERVER_BASE_URL: http://localhost:8080
      QGIS_SERVER_INTERNAL_BASE_URL: http://qgis-server
      QGIS_MODELS_DIR: ./qgis/models
      QGIS_PUBLISH_DIR: ./runtime/published
      QGIS_RUNTIME_BASE_URL: http://qgis-runtime:8090
      DATABASE_URL: postgresql://geo_agent:geo_agent@postgis:5432/geo_agent
    ports:
      - "8000:8000"
    volumes:
      - ../../runtime:/app/runtime
      - ../../infra/seeds:/app/infra/seeds
      - ../../qgis:/app/qgis
    depends_on:
      - postgis
      - qgis-runtime
      - qgis-server

  qgis-runtime:
    build:
      context: ../..
      dockerfile: infra/docker/qgis-runtime/Dockerfile
      args:
        QGIS_RUNTIME_BASE_IMAGE: ${QGIS_RUNTIME_BASE_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/qgis/qgis-server:3.40.15-noble}
    env_file:
      - ../../.env
    environment:
      RUNTIME_ROOT: ./runtime
      QGIS_MODELS_DIR: ./qgis/models
      QGIS_PUBLISH_DIR: ./runtime/published
      QGIS_PROCESS_BIN: qgis_process
    ports:
      - "8090:8090"
    volumes:
      - ../../runtime:/app/runtime
      - ../../qgis:/app/qgis

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker/Dockerfile
    env_file:
      - ../../.env
    volumes:
      - ../../runtime:/app/runtime
      - ../../qgis:/app/qgis
    environment:
      DATABASE_URL: postgresql://geo_agent:geo_agent@postgis:5432/geo_agent
    depends_on:
      - api

  postgis:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: geo_agent
      POSTGRES_USER: geo_agent
      POSTGRES_PASSWORD: geo_agent
    ports:
      - "5432:5432"
    volumes:
      - ../../infra/migrations:/docker-entrypoint-initdb.d

  qgis-server:
    image: ${QGIS_SERVER_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/qgis/qgis-server:3.40.15-noble}
    ports:
      - "8080:80"
    volumes:
      - ../../runtime:/io/data
      - ../docker/qgis-server/nginx.conf:/etc/nginx/nginx.conf:ro

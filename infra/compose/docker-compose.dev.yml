services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api/Dockerfile
    env_file:
      - ../../.env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8010}
      APP_BASE_URL: ${APP_BASE_URL:-}
      WEB_DEV_PORT: ${WEB_DEV_PORT:-5173}
      WEB_BASE_URL: ${WEB_BASE_URL:-}
      RUNTIME_ROOT: ./runtime
      SEED_LAYERS_DIR: ./infra/seeds/layers
      DATABASE_URL: postgresql://geo_agent:geo_agent@postgis:5432/geo_agent
      WEATHER_UPLOAD_MAX_BYTES: ${WEATHER_UPLOAD_MAX_BYTES:-524288000}
    ports:
      - "${API_PORT:-8010}:${API_PORT:-8010}"
    volumes:
      - ../../runtime:/app/runtime
      - ../../infra/seeds:/app/infra/seeds
    depends_on:
      - postgis

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker/Dockerfile
    volumes:
      - ../../runtime:/app/runtime
    environment:
      APP_ENV: development
      RUNTIME_ROOT: ./runtime
      DATABASE_URL: postgresql://geo_agent:geo_agent@postgis:5432/geo_agent
    depends_on:
      - api

  postgis:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: geo_agent
      POSTGRES_USER: geo_agent
      POSTGRES_PASSWORD: geo_agent
    ports:
      - "${POSTGIS_PORT:-5432}:5432"
    volumes:
      - ../../infra/migrations:/docker-entrypoint-initdb.d

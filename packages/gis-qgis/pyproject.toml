[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "gis-qgis"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.28.0",
  "gis-common",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

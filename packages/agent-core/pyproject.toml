[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-core"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "openai-agents>=0.17.0",
  "openai>=1.0.0",
  "shared-types",
  "gis-common",
  "model-adapters",
  "tool-registry",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

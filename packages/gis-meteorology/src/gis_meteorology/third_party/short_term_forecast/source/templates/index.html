<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短时临近预报（短临）预报 — 降水等级表格生成</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; min-height: 100vh; }

.header { background: linear-gradient(135deg, #1F4E79, #2E75B6); color: #fff; padding: 18px 24px; }
.header h1 { font-size: 20px; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

.main { max-width: 900px; margin: 20px auto; padding: 0 16px; }

.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 16px; }
.card h3 { font-size: 15px; color: #1F4E79; margin-bottom: 14px; border-left: 3px solid #2E75B6; padding-left: 10px; cursor: pointer; user-select: none; }

.form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 140px; }
.form-group label { display: block; font-size: 12px; color: #555; margin-bottom: 3px; }
.form-group input { width: 100%; padding: 6px 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; }
.form-group input:focus { outline: none; border-color: #2E75B6; }
.form-group select { width: 100%; padding: 6px 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; }
.form-group input[type="color"] { width: 50px; height: 28px; padding: 1px; cursor: pointer; }

.input-row { display: flex; gap: 4px; }
.input-row input { flex: 1; padding: 7px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; }
.input-row input:focus { outline: none; border-color: #2E75B6; box-shadow: 0 0 0 2px rgba(46,117,182,0.15); }
.input-row button { padding: 7px 14px; border: 1px solid #d9d9d9; border-radius: 4px; background: #fafafa; font-size: 13px; cursor: pointer; white-space: nowrap; }
.input-row button:hover { background: #e8f0f8; border-color: #2E75B6; }

/* 样式面板网格 */
.style-grid { display: flex; flex-direction: column; gap: 2px; }
.style-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 4px; }
.style-row:nth-child(odd) { background: #fafafa; }
.style-label { width: 70px; font-size: 13px; font-weight: 600; color: #1F4E79; flex-shrink: 0; }
.style-item { display: flex; align-items: center; gap: 4px; }
.style-hint { font-size: 11px; color: #999; margin-right: 2px; white-space: nowrap; }
.style-item input[type="color"] { width: 34px; height: 24px; border: 1px solid #d0d0d0; border-radius: 3px; cursor: pointer; padding: 1px; background: #fff; }
.style-item select { padding: 4px 6px; border: 1px solid #d0d0d0; border-radius: 3px; font-size: 12px; background: #fff; }
.style-item input[type="color"]:hover, .style-item select:hover { border-color: #2E75B6; }

.btn-row { display: flex; gap: 10px; margin-top: 8px; }
.btn { padding: 9px 28px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: bold; }
.btn-primary { background: #2E75B6; color: #fff; }
.btn-primary:hover { background: #1F4E79; }
.btn-primary:disabled { background: #a0c4e0; cursor: not-allowed; }
.btn-outline { background: #fff; color: #2E75B6; border: 1px solid #2E75B6; }
.btn-outline:hover { background: #e8f0f8; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 999; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 8px; width: 600px; max-height: 70vh; display: flex; flex-direction: column; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
.modal-header { padding: 14px 18px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
.modal-header h3 { font-size: 15px; border: none; padding: 0; margin: 0; }
.modal-header button { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }
.modal-header button:hover { color: #333; }

.breadcrumb { padding: 8px 18px; font-size: 12px; color: #666; background: #f9f9f9; border-bottom: 1px solid #eee; }
.breadcrumb span { color: #2E75B6; cursor: pointer; }
.breadcrumb span:hover { text-decoration: underline; }

.quick-links { display: flex; gap: 6px; padding: 8px 18px; font-size: 12px; flex-wrap: wrap; border-bottom: 1px solid #eee; }
.quick-links span { color: #888; }
.quick-links a { color: #2E75B6; cursor: pointer; text-decoration: none; }
.quick-links a:hover { text-decoration: underline; }

.file-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.file-item { display: flex; align-items: center; padding: 8px 18px; cursor: pointer; font-size: 13px; gap: 8px; }
.file-item:hover { background: #e8f0f8; }
.file-item .icon { width: 20px; text-align: center; font-size: 16px; }
.file-item.dir { color: #2E75B6; font-weight: 500; }
.file-item.file { color: #333; }

.modal-footer { padding: 12px 18px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 8px; }
.modal-footer button { padding: 7px 20px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid #d9d9d9; background: #fff; }
.modal-footer button.btn-confirm { background: #2E75B6; color: #fff; border-color: #2E75B6; }

.log-box { background: #1e1e1e; color: #d4d4d4; font-family: Consolas, monospace; font-size: 12px; padding: 12px; border-radius: 4px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; display: none; }

.result-area { display: none; }
.result-area.show { display: block; }
.preview { text-align: center; }
.preview img { max-width: 100%; border: 1px solid #e0e0e0; border-radius: 4px; }

.table-wrap { max-height: 400px; overflow-y: auto; margin-top: 12px; }
table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
table.data th { background: #2E75B6; color: #fff; padding: 8px; position: sticky; top: 0; }
table.data td { padding: 7px 8px; text-align: center; border-bottom: 1px solid #eee; }
table.data tr:nth-child(1) td, table.data tr:nth-child(2) td, table.data tr:nth-child(3) td { background: #FFF2CC; }

.spinner { display: none; text-align: center; padding: 30px; }
.spinner.show { display: block; }
.spinner::after { content: ''; display: inline-block; width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #2E75B6; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>短时临近降水预报</h1>
  <p>区县级降水等级表格生成工具</p>
</div>

<div class="main">

  <!-- 数据配置 -->
  <div class="card">
    <h3>数据配置</h3>
    <div class="form-row">
      <div class="form-group">
        <label>NC数据目录</label>
        <div class="input-row">
          <input id="nc_dir" value="{{ config.nc_dir }}" placeholder="选择NC数据所在目录">
          <button onclick="openBrowser('nc_dir', '', '选择NC数据目录')">浏览…</button>
        </div>
      </div>
      <div class="form-group">
        <label>区划边界文件 (.shp)</label>
        <div class="input-row">
          <input id="shp_path" value="{{ config.shp_path }}" placeholder="选择Shapefile文件">
          <button onclick="openBrowser('shp_path', '.shp', '选择区划边界文件')">浏览…</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="max-width:120px">
        <label>显示前N名</label>
        <input id="top_n" type="number" value="{{ config.top_n }}" min="1" max="50">
      </div>
    </div>
  </div>

  <!-- 样式设置 -->
  <div class="card">
    <h3 onclick="var p=document.getElementById('stylePanel');p.style.display=p.style.display==='none'?'block':'none';" style="display:flex;justify-content:space-between;align-items:center;">
      样式设置 <span style="font-size:11px;color:#999;font-weight:normal;">▾ 展开修改</span>
    </h3>
    <div id="stylePanel" style="display:none;">
      <div class="style-grid">
        <!-- 标题 -->
        <div class="style-row">
          <div class="style-label">标题</div>
          <div class="style-item"><span class="style-hint">文字</span><input type="text" id="sty_titleText" value="降水全市前10站点" style="width:160px;font-size:11px;"></div>
          <div class="style-item"><span class="style-hint">颜色</span><input type="color" id="sty_titleColor" value="#2E72D6"></div>
          <div class="style-item"><span class="style-hint">字号</span><select id="sty_titleSize"><option value="10px">10px</option><option value="12px">12px</option><option value="14px">14px</option><option value="16px">16px</option><option value="18px">18px</option><option value="19px" selected>19px</option><option value="20px">20px</option><option value="22px">22px</option><option value="24px">24px</option><option value="26px">26px</option><option value="28px">28px</option><option value="30px">30px</option><option value="32px">32px</option><option value="36px">36px</option><option value="40px">40px</option><option value="44px">44px</option><option value="48px">48px</option></select></div>
        </div>
        <div class="style-row">
          <div class="style-label">箭头</div>
          <div class="style-item"><span class="style-hint">左符号</span><input type="text" id="sty_arrowLeft" value="◀◀" style="width:60px;font-size:14px;text-align:center;"></div>
          <div class="style-item"><span class="style-hint">右符号</span><input type="text" id="sty_arrowRight" value="▶▶" style="width:60px;font-size:14px;text-align:center;"></div>
          <div class="style-item"><span class="style-hint">颜色</span><input type="color" id="sty_arrowColor" value="#8CB4E0"></div>
          <div class="style-item"><span class="style-hint">字号</span><select id="sty_arrowSize"><option value="8px">8px</option><option value="10px">10px</option><option value="12px">12px</option><option value="14px">14px</option><option value="15px" selected>15px</option><option value="16px">16px</option><option value="18px">18px</option><option value="20px">20px</option><option value="22px">22px</option><option value="24px">24px</option><option value="28px">28px</option></select></div>
        </div>
        <!-- 时间 -->
        <div class="style-row">
          <div class="style-label">时间行</div>
          <div class="style-item"><span class="style-hint">颜色</span><input type="color" id="sty_timeColor" value="#2E72D6"></div>
          <div class="style-item"><span class="style-hint">字号</span><select id="sty_timeSize"><option value="8px">8px</option><option value="10px">10px</option><option value="11px">11px</option><option value="12px">12px</option><option value="13px">13px</option><option value="14px" selected>14px</option><option value="15px">15px</option><option value="16px">16px</option><option value="18px">18px</option><option value="20px">20px</option><option value="22px">22px</option><option value="24px">24px</option></select></div>
        </div>
        <!-- 表头 -->
        <div class="style-row">
          <div class="style-label">表头</div>
          <div class="style-item"><span class="style-hint">背景色</span><input type="color" id="sty_headerBg" value="#E8F0FA"></div>
          <div class="style-item"><span class="style-hint">文字色</span><input type="color" id="sty_headerColor" value="#333333"></div>
          <div class="style-item"><span class="style-hint">字号</span><select id="sty_headerSize"><option value="8px">8px</option><option value="9px">9px</option><option value="10px">10px</option><option value="11px">11px</option><option value="12px">12px</option><option value="13px" selected>13px</option><option value="14px">14px</option><option value="15px">15px</option><option value="16px">16px</option><option value="18px">18px</option><option value="20px">20px</option><option value="22px">22px</option></select></div>
        </div>
        <!-- 数据行 -->
        <div class="style-row">
          <div class="style-label">数据行</div>
          <div class="style-item"><span class="style-hint">文字色</span><input type="color" id="sty_dataColor" value="#333333"></div>
          <div class="style-item"><span class="style-hint">字号</span><select id="sty_dataSize"><option value="8px">8px</option><option value="9px">9px</option><option value="10px">10px</option><option value="11px">11px</option><option value="12px">12px</option><option value="13px" selected>13px</option><option value="14px">14px</option><option value="15px">15px</option><option value="16px">16px</option><option value="18px">18px</option><option value="20px">20px</option><option value="22px">22px</option></select></div>
          <div class="style-item"><span class="style-hint">排行数字色</span><input type="color" id="sty_rankColor" value="#2E72D6"></div>
          <div class="style-item"><span class="style-hint">排行字号</span><select id="sty_rankSize"><option value="10px">10px</option><option value="11px">11px</option><option value="12px">12px</option><option value="13px" selected>13px</option><option value="14px">14px</option><option value="15px">15px</option><option value="16px">16px</option><option value="18px">18px</option></select></div>
          <div class="style-item"><span class="style-hint">前三名底色</span><input type="color" id="sty_top3Bg" value="#FFF2CC"></div>
        </div>
        <!-- 表格外观 -->
        <div class="style-row">
          <div class="style-label">表格外观</div>
          <div class="style-item"><span class="style-hint">边框色</span><input type="color" id="sty_borderColor" value="#E0E0E0"></div>
          <div class="style-item"><span class="style-hint">边框样式</span><select id="sty_borderStyle"><option value="solid" selected>实线</option><option value="dashed">虚线</option><option value="dotted">点线</option><option value="none">无边框</option></select></div>
          <div class="style-item"><span class="style-hint">背景色</span><input type="color" id="sty_bgColor" value="#FFFFFF"></div>
        </div>
        <div class="style-row">
          <div class="style-label">尺寸</div>
          <div class="style-item"><span class="style-hint">表格宽度</span><select id="sty_tableWidth"><option value="340px">340px</option><option value="360px">360px</option><option value="380px">380px</option><option value="400px">400px</option><option value="420px">420px</option><option value="430px" selected>430px</option><option value="440px">440px</option><option value="460px">460px</option><option value="480px">480px</option><option value="500px">500px</option><option value="540px">540px</option><option value="600px">600px</option></select></div>
          <div class="style-item"><span class="style-hint">行高</span><select id="sty_rowHeight"><option value="28px">28px</option><option value="30px">30px</option><option value="32px">32px</option><option value="34px">34px</option><option value="36px">36px</option><option value="38px" selected>38px</option><option value="40px">40px</option><option value="42px">42px</option><option value="44px">44px</option><option value="48px">48px</option><option value="52px">52px</option><option value="56px">56px</option></select></div>
        </div>
      </div>
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid #e8e8e8;">
        <label style="font-size:12px;color:#888;">AI 文字修改样式（如："标题改成红色，字号加大"）</label>
        <div class="input-row" style="margin-top:4px;">
          <input id="aiKey" placeholder="DeepSeek API Key（仅需填一次）" style="flex:1;font-size:11px;" type="password">
        </div>
        <div class="input-row" style="margin-top:4px;">
          <input id="aiText" placeholder="输入文字描述想要的样式…" style="flex:1;">
          <button class="btn btn-primary" onclick="aiModify()" style="font-size:12px;padding:6px 14px;">AI 修改</button>
        </div>
        <div id="aiStatus" style="font-size:11px;color:#888;margin-top:3px;display:none;"></div>
      </div>
      <div style="margin-top:8px;text-align:right;">
        <button class="btn btn-outline" onclick="resetStyles()">重置默认</button>
      </div>
    </div>
  </div>

  <!-- 生成按钮 -->
  <div class="btn-row" style="margin-bottom:16px;">
    <button class="btn btn-primary" id="btnGenerate" onclick="doGenerate()">开始生成</button>
    <button class="btn btn-outline" id="btnDownloadExcel" style="display:none" onclick="downloadExcel()">下载Excel</button>
    <button class="btn btn-outline" id="btnDownloadImg" style="display:none" onclick="downloadImg()">下载图片</button>
  </div>

  <!-- 文件浏览器弹窗 -->
  <div class="modal-overlay" id="fileModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">选择目录</h3>
        <button onclick="closeModal()">&times;</button>
      </div>
      <div class="quick-links" id="quickLinks"></div>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="file-list" id="fileList"></div>
      <div class="modal-footer">
        <button onclick="closeModal()">取消</button>
        <button class="btn-confirm" id="btnSelect" onclick="confirmSelect()">选择当前目录</button>
      </div>
    </div>
  </div>

  <!-- 加载动画 -->
  <div class="spinner" id="spinner"></div>

  <!-- 日志 -->
  <div class="log-box" id="logBox"></div>

  <!-- 结果区 -->
  <div class="result-area" id="resultArea">
    <div class="card">
      <h3 id="resultTitle">降水等级表格</h3>
      <div class="preview"><img id="previewImg" src="" alt="表格预览"></div>
      <div class="table-wrap">
        <table class="data" id="dataTable">
          <thead><tr><th>排行</th><th>区县</th><th>乡镇</th><th>站点</th><th>雨量</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
// ══════ 样式收集 ══════
var _STYLE_KEYS = ['titleText','titleColor','titleSize','arrowLeft','arrowRight','arrowColor','arrowSize','timeColor','timeSize','tableWidth','headerBg','headerColor','headerSize','dataColor','dataSize','rankColor','rankSize','top3Bg','rowHeight','borderColor','borderStyle','bgColor'];

var defaultStyles = {};
fetch('/api/styles').then(function(r){return r.json();}).then(function(s){ defaultStyles = s; });
// 恢复缓存的 API Key
(function(){ try { var k = localStorage.getItem('ai_api_key'); if (k) document.getElementById('aiKey').value = k; } catch(e) {} })();

function collectStyles() {
  var s = {};
  for (var i = 0; i < _STYLE_KEYS.length; i++) {
    var k = _STYLE_KEYS[i];
    var el = document.getElementById('sty_' + k);
    s[k] = el ? el.value : '';
  }
  return s;
}

function resetStyles() {
  for (var i = 0; i < _STYLE_KEYS.length; i++) {
    var k = _STYLE_KEYS[i];
    var el = document.getElementById('sty_' + k);
    if (el && defaultStyles[k]) el.value = defaultStyles[k];
  }
}

function aiModify() {
  var text = document.getElementById('aiText').value.trim();
  if (!text) { alert('请输入文字描述'); return; }

  // API Key：优先用页面输入，其次用 localStorage 缓存的
  var keyInput = document.getElementById('aiKey');
  var apiKey = keyInput.value.trim();
  if (apiKey) {
    try { localStorage.setItem('ai_api_key', apiKey); } catch(e) {}
  } else {
    try { apiKey = localStorage.getItem('ai_api_key') || ''; } catch(e) {}
  }
  if (!apiKey) { alert('请先填入 DeepSeek API Key'); return; }

  var statusEl = document.getElementById('aiStatus');
  statusEl.style.display = 'block';
  statusEl.textContent = 'AI 处理中…';
  statusEl.style.color = '#888';

  fetch('/api/ai-styles', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text: text, api_key: apiKey})
  })
  .then(function(r){
    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + r.statusText);
    return r.json();
  })
  .then(function(data){
    if (data.ok && data.styles) {
      var changed = [];
      for (var k in data.styles) {
        var el = document.getElementById('sty_' + k);
        if (el) {
          el.value = data.styles[k];
          changed.push(k + '=' + data.styles[k]);
        }
      }
      if (changed.length > 0) {
        statusEl.textContent = '✓ 已修改: ' + changed.join(', ');
        statusEl.style.color = '#4CAF50';
      } else {
        statusEl.textContent = 'AI 未识别到可修改的样式项';
        statusEl.style.color = '#FF9800';
      }
    } else {
      statusEl.textContent = '✗ 错误: ' + (data.error || '未知');
      statusEl.style.color = '#F44336';
    }
  })
  .catch(function(err){
    statusEl.textContent = '✗ 请求失败: ' + (err.message || err) + ' (检查Flask是否运行中)';
    statusEl.style.color = '#F44336';
    console.error('aiModify error:', err);
  });
}

// ══════ 文件浏览器 ══════
var browseTarget = '', browseFilter = '', currentPath = 'C:\\', selectedPath = '';

function openBrowser(targetId, filter, title) {
  browseTarget = targetId; browseFilter = filter;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('btnSelect').style.display = filter ? 'none' : 'inline-block';
  document.getElementById('fileModal').classList.add('show');
  var curVal = document.getElementById(targetId).value;
  navigate(curVal && curVal.length > 2 ? curVal : 'C:\\work\\yan1-2\\气象');
}

function closeModal() { document.getElementById('fileModal').classList.remove('show'); }
function confirmSelect() { document.getElementById(browseTarget).value = currentPath; closeModal(); }

function navigate(path) {
  var url = '/api/browse?path=' + encodeURIComponent(path);
  if (browseFilter) url += '&filter=' + encodeURIComponent(browseFilter);
  fetch(url).then(function(r){return r.json();}).then(renderBrowser);
}

function renderBrowser(data) {
  currentPath = data.current;
  var ql = document.getElementById('quickLinks'), bc = document.getElementById('breadcrumb'), fl = document.getElementById('fileList');
  ql.innerHTML = '<span>快捷跳转:</span> ';
  (data.roots || []).forEach(function(r){ ql.innerHTML += '<a onclick="navigate(\'' + r.path.replace(/\\/g,'\\\\') + '\')">' + r.name + '</a> '; });
  var parts = data.current.split('\\').filter(Boolean);
  bc.innerHTML = ''; var built = '';
  parts.forEach(function(p, i){ built += (i === 0 ? p : '\\' + p); bc.innerHTML += (i > 0 ? ' \\ ' : '') + '<span onclick="navigate(\'' + built.replace(/\\/g,'\\\\') + '\')">' + p + '</span>'; });
  if (data.parent && data.parent !== data.current) bc.innerHTML = '<span onclick="navigate(\'' + data.parent.replace(/\\/g,'\\\\') + '\')">⬆ 上级目录</span> &nbsp;|&nbsp; ' + bc.innerHTML;
  fl.innerHTML = '';
  (data.items || []).forEach(function(item){
    var cls = 'file-item ' + item.type, icon = item.type === 'dir' ? '📁' : '📄';
    if (browseFilter && item.type === 'file') fl.innerHTML += '<div class="' + cls + '" onclick="selectFile(\'' + item.path.replace(/\\/g,'\\\\') + '\')"><span class="icon">' + icon + '</span>' + item.name + '</div>';
    else if (item.type === 'dir') fl.innerHTML += '<div class="' + cls + '" ondblclick="navigate(\'' + item.path.replace(/\\/g,'\\\\') + '\')" onclick="highlightItem(this, \'' + item.path.replace(/\\/g,'\\\\') + '\')"><span class="icon">' + icon + '</span>' + item.name + '</div>';
    else fl.innerHTML += '<div class="' + cls + '"><span class="icon">' + icon + '</span>' + item.name + '</div>';
  });
}

function highlightItem(el, path) { selectedPath = path; document.querySelectorAll('.file-item.selected').forEach(function(e){e.classList.remove('selected');}); el.classList.add('selected'); }
function selectFile(path) { document.getElementById(browseTarget).value = path; closeModal(); }
document.getElementById('fileModal').addEventListener('click', function(e){ if (e.target === this) closeModal(); });

// ══════ 生成 ══════
function doGenerate() {
  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('spinner').classList.add('show');
  document.getElementById('logBox').style.display = 'block';
  document.getElementById('logBox').textContent = '正在处理...';
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('btnDownloadExcel').style.display = 'none';
  document.getElementById('btnDownloadImg').style.display = 'none';

  var stylesToSend = collectStyles();
  document.getElementById('logBox').textContent = '发送样式: ' + JSON.stringify(stylesToSend);

  fetch('/api/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      nc_dir: document.getElementById('nc_dir').value,
      shp_path: document.getElementById('shp_path').value,
      top_n: parseInt(document.getElementById('top_n').value) || 10,
      styles: stylesToSend
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    document.getElementById('btnGenerate').disabled = false;
    document.getElementById('spinner').classList.remove('show');
    if (data.ok) {
      document.getElementById('logBox').textContent = '发送样式: ' + JSON.stringify(stylesToSend) + '\n\n' + data.logs.join('\n');
      document.getElementById('resultArea').classList.add('show');
      document.getElementById('previewImg').src = 'data:image/png;base64,' + data.image_b64;
      var tbody = document.querySelector('#dataTable tbody');
      tbody.innerHTML = '';
      data.top_data.forEach(function(row){
        tbody.innerHTML += '<tr><td>' + row.rank + '</td><td>' + row.county + '</td><td>-</td><td>-</td><td>' + row.area_rain + '</td></tr>';
      });
      document.getElementById('btnDownloadExcel').style.display = 'inline-block';
      document.getElementById('btnDownloadImg').style.display = 'inline-block';
    } else {
      document.getElementById('logBox').textContent = '错误: ' + data.error + '\n\n' + (data.trace || '');
    }
  })
  .catch(function(err){
    document.getElementById('btnGenerate').disabled = false;
    document.getElementById('spinner').classList.remove('show');
    document.getElementById('logBox').textContent = '网络错误: ' + err;
  });
}

function downloadExcel() { window.open('/api/download/降水等级表格.xlsx', '_blank'); }
function downloadImg()  { window.open('/api/download/降水等级表格.png', '_blank'); }
</script>

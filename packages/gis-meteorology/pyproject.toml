[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "gis-meteorology"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "cfgrib>=0.9.15.0",
  "contourpy>=1.3.0",
  "geopandas>=1.0.0",
  "h5netcdf>=1.6.0",
  "h5py>=3.12.0",
  "matplotlib>=3.9.0",
  "netCDF4>=1.7.0",
  "numpy>=2.0.0",
  "openpyxl>=3.1.0",
  "pandas>=2.2.0",
  "Pillow>=11.0.0",
  "python-docx>=1.2.0",
  "rasterio>=1.4.0",
  "scipy>=1.14.0",
  "shapely>=2.0.0",
  "xarray>=2025.1.0",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

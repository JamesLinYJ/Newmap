[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "model-adapters"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "pydantic-settings>=2.8.0",
  "shared-types",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

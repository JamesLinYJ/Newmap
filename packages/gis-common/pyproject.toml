[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "gis-common"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "pyproj>=3.7.0",
  "shapely>=2.0.0",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

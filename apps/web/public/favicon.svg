<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- 地球背景 -->
  <circle cx="32" cy="32" r="30" fill="url(#globe-grad)" stroke="url(#rim-grad)" stroke-width="1.5"/>
  <!-- 经纬线 -->
  <ellipse cx="32" cy="32" rx="18" ry="30" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <ellipse cx="32" cy="32" rx="30" ry="14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="32" y1="2" x2="32" y2="62" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <line x1="2" y1="32" x2="62" y2="32" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <!-- 大陆色块 -->
  <ellipse cx="26" cy="20" rx="1.5" ry="1" fill="rgba(255,255,255,0.3)" transform="rotate(-15 26 20)"/>
  <ellipse cx="30" cy="18" rx="2" ry="1.2" fill="rgba(255,255,255,0.25)" transform="rotate(10 30 18)"/>
  <ellipse cx="24" cy="24" rx="1.8" ry="1.3" fill="rgba(255,255,255,0.3)" transform="rotate(-5 24 24)"/>
  <ellipse cx="38" cy="42" rx="2.2" ry="1.4" fill="rgba(255,255,255,0.25)" transform="rotate(20 38 42)"/>
  <ellipse cx="40" cy="38" rx="1.6" ry="1" fill="rgba(255,255,255,0.3)" transform="rotate(-10 40 38)"/>
  <!-- 定位标记 -->
  <path d="M32 49 L28 38 L24 36 L32 35 L40 36 L36 38 Z" fill="#fff" opacity="0.95"/>
  <circle cx="32" cy="35" r="3" fill="url(#pin-grad)"/>
  <circle cx="32" cy="35" r="1.2" fill="#fff"/>
  <defs>
    <linearGradient id="globe-grad" x1="8" y1="8" x2="56" y2="56">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rim-grad" x1="2" y1="2" x2="62" y2="62">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
    <linearGradient id="pin-grad" x1="29" y1="34" x2="35" y2="36">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
</svg>
